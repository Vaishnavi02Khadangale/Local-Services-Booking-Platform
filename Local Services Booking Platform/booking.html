<!DOCTYPE html>
<html>

<head>
    <title>Book Service</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h2>Book a Service</h2>

    <form id="bookingForm">

        <input type="text" id="name" placeholder="Your Name" required><br><br>

        <input type="text" id="phone" placeholder="Phone Number" required><br><br>

        <input type="text" id="city" placeholder="City" required><br><br>

        <input type="text" id="address" placeholder="Address" required><br><br>

        <input type="text" id="service" placeholder="Service Type" readonly><br><br>

        <textarea id="notes" placeholder="Describe your problem"></textarea><br><br>

        <button type="submit">Submit Booking</button>

    </form>

    <script src="app.js"></script>

</body>

</html>
